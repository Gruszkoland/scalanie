name: CI — ADRION 369 Architecture

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --cov=core \
            --cov-report=term-missing:skip-covered \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=90 \
            -v --tb=short

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml

  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install linting tools
        run: pip install ruff mypy

      - name: Ruff lint
        run: ruff check core/ tests/

      - name: Mypy type check
        run: mypy core/ --ignore-missing-imports --strict
        continue-on-error: true  # strict mode — promote to hard-fail after initial cleanup

  canonical-sync:
    name: Verify Canonical JSON integrity
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate GUARDIAN_LAWS_CANONICAL.json schema
        run: |
          python3 - << 'EOF'
          import json, sys

          with open("GUARDIAN_LAWS_CANONICAL.json") as f:
              data = json.load(f)

          required_top = {"version", "laws", "weight_map", "deny_weighted_threshold", "mapping"}
          missing = required_top - set(data.keys())
          if missing:
              print(f"FAIL: missing top-level fields: {missing}")
              sys.exit(1)

          valid_severities = {"CRITICAL", "HIGH", "MEDIUM"}
          for law in data["laws"]:
              if "severity" not in law:
                  print(f"FAIL: {law['id']} missing severity field")
                  sys.exit(1)
              if law["severity"] not in valid_severities:
                  print(f"FAIL: {law['id']} invalid severity: {law['severity']}")
                  sys.exit(1)

          # G7 and G8 must be CRITICAL
          for law in data["laws"]:
              if law["id"] in ("G7", "G8") and law["severity"] != "CRITICAL":
                  print(f"FAIL: {law['id']} must be CRITICAL, got {law['severity']}")
                  sys.exit(1)

          print(f"OK: GUARDIAN_LAWS_CANONICAL.json v{data['version']} — {len(data['laws'])} laws validated")
          EOF
